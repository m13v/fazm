name: Deploy Rust Backend

on:
  push:
    branches: [main]
    paths:
      - 'Backend/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/472661769323/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider
          service_account: github-actions-deploy@fazm-prod.iam.gserviceaccount.com

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: fazm-backend
          region: us-east5
          source: Backend/
          # min-instances=2 keeps two instances warm so bursts (Sparkle 24h-aligned
          # appcast checks, /v1/keys ensureKeys storms after launch) never hit a cold
          # start. memory=512Mi gives headroom for the appcast in-memory cache and
          # concurrent TLS sessions to GitHub/Firestore.
          flags: '--min-instances=2 --memory=512Mi'
